<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Scan</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: monospace;
      overflow: hidden;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .hidden { display: none; }

    .bar {
      width: 80%;
      height: 10px;
      border: 1px solid #00ffcc;
      margin-top: 20px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #00ffcc;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #00ffcc;
      color: black;
      border: none;
      cursor: pointer;
    }

    .card {
      border: 1px solid #00ffcc;
      padding: 15px;
      margin: 10px 0;
    }
  </style>
</head>
<body>

<div id="loading" class="center">
  <div>Scanning user data...</div>
  <div class="bar"><div class="progress" id="progress"></div></div>
</div>

<div id="dashboard" class="center hidden">
  <h2>USER PROFILE: FRIEND</h2>

  <div class="card">Energy: unpredictable</div>
  <div class="card">Vibe: unmatched</div>
  <div class="card">mood : not constant</div>

  <button onclick="showSecret()">Access Hidden File</button>
</div>

<div id="secret" class="center hidden">
  <p>Nothing here</p>
  <button onclick="finalScreen()">Continue</button>
</div>

<div id="final" class="center hidden">
  <h1>HAPPY BIRTHDAY 🎂</h1>

</div>

<script>
  let progress = 0;
  let bar = document.getElementById("progress");

  let interval = setInterval(() => {
    progress += 2;
    bar.style.width = progress + "%";

    if (progress >= 100) {
      clearInterval(interval);
      document.getElementById("loading").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
    }
  }, 50);

  function showSecret() {
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("secret").classList.remove("hidden");
  }

  function finalScreen() {
    document.getElementById("secret").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");
  }
</script>

</body>
</html>
